<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Wait for Response Icon - Phone receiving -->
  <defs>
    <style>
      .wait-bg { fill: #2196F3; }
      .wait-fg { fill: white; stroke: white; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" class="wait-bg"/>
  
  <!-- Phone outline -->
  <rect x="22" y="14" width="20" height="36" rx="2" class="wait-fg" stroke="#2196F3" fill="none" stroke-width="1.5"/>
  
  <!-- Phone screen -->
  <rect x="24" y="16" width="16" height="28" rx="1" class="wait-fg" stroke="#2196F3" fill="none" stroke-width="1"/>
  
  <!-- Incoming arrow wave -->
  <path d="M 36 30 Q 40 26 44 30" class="wait-fg" stroke="#2196F3" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 36 36 Q 42 30 48 36" class="wait-fg" stroke="#2196F3" fill="none" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Speaker at bottom -->
  <circle cx="32" cy="50" r="2" class="wait-fg" fill="#2196F3"/>
</svg>
