<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Decision Maker Icon - Branch -->
  <defs>
    <style>
      .decision-bg { fill: #FF9800; }
      .decision-fg { fill: white; stroke: white; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" class="decision-bg"/>
  
  <!-- Diamond decision shape -->
  <polygon points="32,14 46,32 32,50 18,32" class="decision-fg" stroke="#FF9800" fill="none" stroke-width="1.5"/>
  
  <!-- YES arrow left -->
  <line x1="18" y1="32" x2="8" y2="32" class="decision-fg" stroke="#FF9800" stroke-width="1.5"/>
  <polyline points="8,32 10,30 12,32 10,34" class="decision-fg" stroke="#FF9800" fill="none" stroke-width="1"/>
  
  <!-- NO arrow right -->
  <line x1="46" y1="32" x2="56" y2="32" class="decision-fg" stroke="#FF9800" stroke-width="1.5"/>
  <polyline points="56,32 54,30 52,32 54,34" class="decision-fg" stroke="#FF9800" fill="none" stroke-width="1"/>
  
  <!-- Question mark -->
  <text x="32" y="36" font-size="16" font-weight="bold" text-anchor="middle" class="decision-fg" fill="#FF9800">?</text>
</svg>
