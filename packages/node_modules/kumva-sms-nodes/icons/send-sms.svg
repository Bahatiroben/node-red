<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- SMS Icon - Send -->
  <defs>
    <style>
      .sms-bg { fill: #4CAF50; }
      .sms-fg { fill: white; stroke: white; stroke-width: 1; }
    </style>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" class="sms-bg"/>
  
  <!-- Envelope -->
  <rect x="14" y="20" width="36" height="24" rx="2" class="sms-fg" stroke="#4CAF50" fill="none" stroke-width="1.5"/>
  
  <!-- Envelope flap -->
  <polyline points="14,20 32,32 50,20" class="sms-fg" stroke="#4CAF50" fill="none" stroke-width="1.5" stroke-linejoin="miter"/>
  
  <!-- Text lines inside -->
  <line x1="18" y1="28" x2="46" y2="28" class="sms-fg" stroke="#4CAF50" stroke-width="1"/>
  <line x1="18" y1="33" x2="40" y2="33" class="sms-fg" stroke="#4CAF50" stroke-width="1"/>
  <line x1="18" y1="38" x2="44" y2="38" class="sms-fg" stroke="#4CAF50" stroke-width="1"/>
</svg>
