<!--
  SendSMS Node - UI Definition
  Allows users to send SMS messages via Africa's Talking
-->

<script type="text/html" data-template-name="send-sms">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="e.g., Send Welcome SMS">
    </div>

    <div class="form-row">
        <label for="node-input-phoneSource"><i class="fa fa-phone"></i> Phone Number Source</label>
        <select id="node-input-phoneSource" style="width:70%">
            <option value="msg">From Message (msg.phoneNumber)</option>
            <option value="fixed">Enter Manually</option>
        </select>
    </div>

    <div class="form-row" id="phone-fixed-row" style="display:none">
        <label for="node-input-phone">Phone Number</label>
        <input type="text" id="node-input-phone" placeholder="e.g., +254712345678">
    </div>

    <div class="form-row">
        <label for="node-input-messageSource"><i class="fa fa-envelope"></i> Message Source</label>
        <select id="node-input-messageSource" style="width:70%">
            <option value="msg">From Message (msg.payload)</option>
            <option value="fixed">Enter Manually</option>
        </select>
    </div>

    <div class="form-row" id="message-fixed-row" style="display:none">
        <label for="node-input-message">Message Text</label>
        <textarea id="node-input-message" style="width:100%; height: 80px; font-family: monospace; font-size: 12px;" placeholder="Enter the SMS message text"></textarea>
    </div>

    <div class="form-row">
        <label for="node-input-username"><i class="fa fa-user"></i> Africa's Talking Username</label>
        <input type="text" id="node-input-username" placeholder="Your Africa's Talking username">
    </div>

    <div class="form-row">
        <label for="node-input-apiKey"><i class="fa fa-key"></i> API Key</label>
        <input type="password" id="node-input-apiKey" placeholder="Your Africa's Talking API Key">
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('send-sms', {
        category: 'Kumva SMS',
        color: '#4CAF50',
        defaults: {
            name: {value: ""},
            phoneSource: {value: "msg"},
            phone: {value: ""},
            messageSource: {value: "msg"},
            message: {value: ""},
            username: {value: ""},
            apiKey: {value: ""}
        },
        inputs: 1,
        outputs: 1,
        icon: "envelope.svg",
        label: function() {
            return this.name || "Send SMS";
        },
        oneditprepare: function() {
            const phoneSourceSelect = document.getElementById("node-input-phoneSource");
            const phoneFixedRow = document.getElementById("phone-fixed-row");
            const messageSourceSelect = document.getElementById("node-input-messageSource");
            const messageFixedRow = document.getElementById("message-fixed-row");

            // Update phone visibility
            function updatePhoneVisibility() {
                if (phoneSourceSelect.value === "fixed") {
                    phoneFixedRow.style.display = "block";
                } else {
                    phoneFixedRow.style.display = "none";
                }
            }

            // Update message visibility
            function updateMessageVisibility() {
                if (messageSourceSelect.value === "fixed") {
                    messageFixedRow.style.display = "block";
                } else {
                    messageFixedRow.style.display = "none";
                }
            }

            phoneSourceSelect.addEventListener('change', updatePhoneVisibility);
            messageSourceSelect.addEventListener('change', updateMessageVisibility);

            // Initial state
            updatePhoneVisibility();
            updateMessageVisibility();
        }
    });
</script>

<style>
    [data-template-name="send-sms"] .form-row {
        margin-bottom: 10px;
    }
</style>
