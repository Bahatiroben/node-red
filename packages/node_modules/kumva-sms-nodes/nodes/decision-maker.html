<!--
  DecisionMaker Node - UI Definition
  Allows users to define conditions and branch logic
-->

<script type="text/html" data-template-name="decision-maker">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="e.g., Check User Age">
    </div>

    <div class="form-row">
        <label for="node-input-conditionMode"><i class="fa fa-code-branch"></i> Mode</label>
        <select id="node-input-conditionMode" style="width:70%">
            <option value="binary">Binary (Yes/No)</option>
            <option value="multi">Multiple Conditions</option>
        </select>
    </div>

    <!-- Binary Mode: Condition Type Selection -->
    <div id="binary-mode-section">
        <div class="form-row">
            <label for="node-input-conditionType"><i class="fa fa-question"></i> Condition Type</label>
            <select id="node-input-conditionType" style="width:70%">
                <option value="expression">Expression Evaluation</option>
                <option value="global">Global Variable</option>
                <option value="contact">Contact Exists</option>
                <option value="input">Input Exists</option>
            </select>
        </div>

        <!-- Expression Type Options -->
        <div id="expr-options" class="condition-options">
            <div class="form-row">
                <label for="node-input-expression"><i class="fa fa-calculator"></i> Expression</label>
                <textarea id="node-input-expression" style="width:100%; height:60px; font-family:monospace; font-size:12px;" placeholder="e.g., msg.payload > 18 && msg.country === 'KE'"></textarea>
            </div>
            <div class="form-row" style="font-size:11px; color:#666;">
                <i class="fa fa-info-circle"></i> Available: msg, payload, global, flow, Math, Date
            </div>
        </div>

        <!-- Global Variable Type Options -->
        <div id="global-options" class="condition-options" style="display:none;">
            <div class="form-row">
                <label for="node-input-globalVar"><i class="fa fa-globe"></i> Global Variable Name</label>
                <input type="text" id="node-input-globalVar" placeholder="e.g., isEnabled" style="width:70%">
            </div>
        </div>

        <!-- Contact Type Options -->
        <div id="contact-options" class="condition-options" style="display:none;">
            <div class="form-row">
                <label for="node-input-contactId"><i class="fa fa-user-circle"></i> Contact ID Field</label>
                <input type="text" id="node-input-contactId" placeholder="e.g., msg.contactId" style="width:70%">
            </div>
            <div class="form-row" style="font-size:11px; color:#666;">
                <i class="fa fa-info-circle"></i> Checks if contact ID exists/is valid
            </div>
        </div>
    </div>

    <!-- Multi Condition Mode: Condition List -->
    <div id="multi-mode-section" style="display:none;">
        <div class="form-row">
            <label><i class="fa fa-list"></i> Conditions</label>
            <div id="node-input-conditions-container" style="width:100%; border:1px solid #ccc; border-radius:4px; padding:10px;">
                <ol id="node-input-conditions-list" style="margin:0; padding-left:20px;"></ol>
            </div>
        </div>
        <div class="form-row">
            <button class="editor-button" id="btn-add-condition" style="width:30%"><i class="fa fa-plus"></i> Add Condition</button>
        </div>
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('decision-maker', {
        category: 'Kumva SMS',
        color: '#FF9800',
        defaults: {
            name: {value: ""},
            conditionMode: {value: "binary"},
            conditionType: {value: "expression"},
            conditions: {value: []},
            expression: {value: ""},
            globalVar: {value: ""},
            contactId: {value: ""}
        },
        inputs: 1,
        outputs: 1,
        outputLabels: function(index) {
            if (this.conditionMode === 'binary') {
                return index === 0 ? "TRUE" : "FALSE";
            } else {
                if (index < this.conditions.length) {
                    return "Condition " + (index + 1);
                } else {
                    return "Else";
                }
            }
        },
        icon: "switch.svg",
        label: function() {
            return this.name || "Decision Maker";
        },
        oneditprepare: function() {
            const node = this;
            const modeSelect = document.getElementById("node-input-conditionMode");
            const condTypeSelect = document.getElementById("node-input-conditionType");
            const binarySection = document.getElementById("binary-mode-section");
            const multiSection = document.getElementById("multi-mode-section");
            const conditionsList = document.getElementById("node-input-conditions-list");
            const addCondBtn = document.getElementById("btn-add-condition");

            // Show/hide sections based on mode
            function updateModeDisplay() {
                if (modeSelect.value === 'binary') {
                    binarySection.style.display = 'block';
                    multiSection.style.display = 'none';
                } else {
                    binarySection.style.display = 'none';
                    multiSection.style.display = 'block';
                    updateConditionsList();
                }
            }

            // Show/hide condition type options
            function updateConditionTypeDisplay() {
                document.getElementById("expr-options").style.display = 'none';
                document.getElementById("global-options").style.display = 'none';
                document.getElementById("contact-options").style.display = 'none';

                if (condTypeSelect.value === 'expression') {
                    document.getElementById("expr-options").style.display = 'block';
                } else if (condTypeSelect.value === 'global') {
                    document.getElementById("global-options").style.display = 'block';
                } else if (condTypeSelect.value === 'contact') {
                    document.getElementById("contact-options").style.display = 'block';
                }
            }

            function updateConditionsList() {
                conditionsList.innerHTML = "";
                node.conditions.forEach((condition, index) => {
                    const li = document.createElement("li");
                    li.style.marginBottom = "8px";
                    li.innerHTML = `
                        <select class="cond-type" style="width:25%; padding:4px;">
                            <option value="expression" ${condition.type === 'expression' ? 'selected' : ''}>Expression</option>
                            <option value="global" ${condition.type === 'global' ? 'selected' : ''}>Global</option>
                            <option value="comparison" ${condition.type === 'comparison' ? 'selected' : ''}>Compare</option>
                        </select>
                        <input type="text" class="cond-value" value="${condition.expression || condition.variable || condition.field || ''}" placeholder="Expression/Variable" style="width:50%; padding:4px; margin:0 5px;">
                        <button class="editor-button cond-delete-btn" style="width:15%; padding:2px;">
                            <i class="fa fa-trash"></i>
                        </button>
                    `;

                    const deleteBtn = li.querySelector(".cond-delete-btn");
                    deleteBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        node.conditions.splice(index, 1);
                        updateConditionsList();
                    });

                    const typeSelect = li.querySelector(".cond-type");
                    const valueInput = li.querySelector(".cond-value");

                    typeSelect.addEventListener("change", function() {
                        node.conditions[index].type = this.value;
                    });

                    valueInput.addEventListener("change", function() {
                        if (node.conditions[index].type === 'expression') {
                            node.conditions[index].expression = this.value;
                        } else if (node.conditions[index].type === 'global') {
                            node.conditions[index].variable = this.value;
                        } else if (node.conditions[index].type === 'comparison') {
                            node.conditions[index].field = this.value;
                        }
                    });

                    conditionsList.appendChild(li);
                });
            }

            addCondBtn.addEventListener("click", function(e) {
                e.preventDefault();
                node.conditions.push({type: "expression", expression: ""});
                updateConditionsList();
            });

            modeSelect.addEventListener('change', updateModeDisplay);
            condTypeSelect.addEventListener('change', updateConditionTypeDisplay);

            updateModeDisplay();
            updateConditionTypeDisplay();
        },
        oneditsave: function() {
            if (this.conditionMode === 'binary') {
                this.outputs = 2; // Yes/No
            } else {
                this.outputs = this.conditions.length + 1; // Conditions + Else
            }
        }
    });
</script>

<style>
    [data-template-name="decision-maker"] .form-row {
        margin-bottom: 10px;
    }

    .condition-options {
        background-color: #f5f5f5;
        padding: 8px;
        border-radius: 4px;
        margin: 5px 0;
    }

    #node-input-conditions-container {
        max-height: 300px;
        overflow-y: auto;
        background-color: #fafafa;
    }
</style>
