<!--
  WaitForResponse Node - UI Definition
  Allows users to define choices and wait for incoming SMS responses
-->

<script type="text/html" data-template-name="wait-for-response">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="e.g., Wait for Menu Choice">
    </div>

    <div class="form-row">
        <label for="node-input-phoneField"><i class="fa fa-phone"></i> Phone Number Field</label>
        <input type="text" id="node-input-phoneField" placeholder="e.g., phoneNumber" style="width:70%">
    </div>

    <div class="form-row">
        <label for="node-input-timeout"><i class="fa fa-clock-o"></i> Timeout (seconds)</label>
        <input type="number" id="node-input-timeout" placeholder="300" style="width:70%" min="10" max="3600">
    </div>

    <div class="form-row">
        <label>&nbsp;</label>
        <input type="checkbox" id="node-input-caseInsensitive" style="display:inline-block; width:15px; vertical-align:baseline;">
        <label for="node-input-caseInsensitive" style="width:auto">Case Insensitive Matching</label>
    </div>

    <div class="form-row">
        <label><i class="fa fa-list"></i> Response Choices</label>
        <div id="node-input-choices-container" style="width:100%; border:1px solid #ccc; border-radius: 4px; padding: 10px;">
            <ol id="node-input-choices-list" style="margin:0; padding-left:20px;"></ol>
        </div>
    </div>

    <div class="form-row">
        <button class="editor-button" id="btn-add-choice" style="width:30%"><i class="fa fa-plus"></i> Add Choice</button>
    </div>
</script>

<script type="text/javascript">
    RED.nodes.registerType('wait-for-response', {
        category: 'Kumva SMS',
        color: '#2196F3',
        defaults: {
            name: {value: ""},
            phoneField: {value: "phoneNumber"},
            timeout: {value: 300},
            caseInsensitive: {value: true},
            choices: {value: []}
        },
        inputs: 1,
        outputs: 1,
        outputLabels: function(index) {
            if (index < this.choices.length) {
                return this.choices[index].label;
            } else if (index === this.choices.length) {
                return "Unmatched";
            } else {
                return "Timeout";
            }
        },
        icon: "arrow-in.svg",
        label: function() {
            return this.name || "Wait for Response";
        },
        oneditprepare: function() {
            const node = this;
            const choicesList = document.getElementById("node-input-choices-list");
            const addChoiceBtn = document.getElementById("btn-add-choice");

            function updateChoicesList() {
                choicesList.innerHTML = "";
                node.choices.forEach((choice, index) => {
                    const li = document.createElement("li");
                    li.style.marginBottom = "8px";
                    li.innerHTML = `
                        <input type="text" class="choice-label" value="${choice.label}" placeholder="Label (e.g., 'Yes')" style="width:45%; padding:4px;">
                        <input type="text" class="choice-value" value="${choice.value}" placeholder="Value (e.g., '1')" style="width:35%; padding:4px; margin:0 5px;">
                        <button class="editor-button choice-delete-btn" style="width:15%; padding:2px; margin:0;">
                            <i class="fa fa-trash"></i>
                        </button>
                    `;
                    
                    const deleteBtn = li.querySelector(".choice-delete-btn");
                    deleteBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        node.choices.splice(index, 1);
                        updateChoicesList();
                    });

                    const labelInput = li.querySelector(".choice-label");
                    const valueInput = li.querySelector(".choice-value");

                    labelInput.addEventListener("change", function() {
                        node.choices[index].label = this.value;
                    });

                    valueInput.addEventListener("change", function() {
                        node.choices[index].value = this.value;
                    });

                    choicesList.appendChild(li);
                });
            }

            addChoiceBtn.addEventListener("click", function(e) {
                e.preventDefault();
                node.choices.push({
                    label: "Option " + (node.choices.length + 1),
                    value: String(node.choices.length + 1)
                });
                updateChoicesList();
            });

            updateChoicesList();
        },
        oneditsave: function() {
            // Update outputs count based on choices
            const choicesCount = this.choices.length;
            this.outputs = choicesCount + 2; // +1 for unmatched, +1 for timeout
        }
    });
</script>

<style>
    [data-template-name="wait-for-response"] .form-row {
        margin-bottom: 10px;
    }
    
    #node-input-choices-container {
        max-height: 300px;
        overflow-y: auto;
        background-color: #fafafa;
    }
</style>
